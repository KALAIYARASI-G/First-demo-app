version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: livetrack-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: demo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ../database/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: livetrack-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_NAME=demo_db
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/demo_db?schema=public
      - COGNITO_USER_POOL_ID=us-east-1_examplepool
      - COGNITO_CLIENT_ID=exampleclientid123
      - COGNITO_REGION=us-east-1
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
    depends_on:
      - db

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: livetrack-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
